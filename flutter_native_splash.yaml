flutter_native_splash:
  color: "#F6F6F9"
  color_dark: "#121212"
  image: assets/images/logo.png
  #image_dark: assets/images/logo_dark.png
  fullscreen: false
  
  android_12:
    color: "#F6F6F9"
    color_dark: "#121212"
    image: assets/images/logo.png
    #image_dark: assets/images/logo_dark.png
    # Optional: If you want the Android 12+ built-in icon zoom
    icon_background_color: "#F6F6F9"
    icon_background_color_dark: "#121212"

  # Keep the native splash alive ONLY until Flutter renders its first frame
  web: false